{
  "domain": "milanuncios.com",
  "enabled": true,
  "mode": "seed_only",
  "start_urls": [
    "https://www.milanuncios.com/alquiler-de-naves-industriales-en-vizcaya/"
  ],
  "rate_limit_seconds": 2,
  "login_allowed": false,
  "archiver_enabled": true,
  "harvest_enabled": true,
  "parser_key": "generic_listing",
  "listing_start_urls": [
    "https://www.milanuncios.com/alquiler-de-naves-industriales-en-vizcaya/"
  ],
  "max_listing_pages": 5,
  "listing_page_start": 1,
  "listing_page_param": "pagina",
  "listing_first_page_uses_start_url": true,
  "listing_card_selectors": [
    "article[data-testid='AD_CARD']",
    "article[data-testid*='AD_CARD']",
    "[data-testid='AD_CARD']"
  ],
  "listing_detail_link_selectors": [
    "a.ma-AdCardListingV2-TitleLink[href]",
    "a[href$='.htm']"
  ],
  "listing_detail_url_patterns": [
    "-\\d+\\.htm(?:\\?|$)"
  ],
  "listing_reject_url_patterns": [
    "/inmobiliaria",
    "/profesional",
    "/mis-anuncios",
    "/buscador",
    "/login",
    "/registro"
  ],
  "listing_block_patterns": [
    "Pardon Our Interruption",
    "geetest",
    "captcha",
    "Access Denied"
  ],
  "notes": "Harvest paginado de Milanuncios reforzado con cards AD_CARD, detalle .htm y detección de bloqueo/captcha para no contaminar el funnel.",
  "timeout_seconds": 20
}
